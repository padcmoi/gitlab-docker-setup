# Apache vhost for GitLab CE (TLS termination + reverse proxy to the
# container bound on 127.0.0.1:${HTTP_PORT}).
#
# Required Apache modules:
#   sudo a2enmod proxy proxy_http proxy_wstunnel ssl headers rewrite
#
# Adjust:
#   - ServerName / Redirect target
#   - ProxyPass target port (must match HTTP_PORT in .env)
#   - SSL certificate paths

<VirtualHost *:80>
    ServerName your-domain.com
    Redirect permanent / https://your-domain.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName your-domain.com

    SSLEngine on

    # Option 1 — Let's Encrypt (uncomment)
    # SSLCertificateFile      /etc/letsencrypt/live/your-domain.com/fullchain.pem
    # SSLCertificateKeyFile   /etc/letsencrypt/live/your-domain.com/privkey.pem

    # Option 2 — Custom certificate (uncomment)
    # SSLCertificateFile      /path/to/your/certificate.crt
    # SSLCertificateKeyFile   /path/to/your/private.key
    # SSLCertificateChainFile /path/to/your/chain.crt

    # Reasonable TLS defaults
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder     on

    # Forward only — never accept proxy requests for arbitrary URLs.
    ProxyRequests Off
    ProxyPreserveHost On

    # Required by GitLab Workhorse to know the original scheme.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Ssl on
    RequestHeader set X-Forwarded-For %h

    # Larger upload limits (GitLab repository pushes, attachments).
    LimitRequestBody 524288000

    # WebSocket upgrade (Web IDE, terminal, live previews).
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://127.0.0.1:1584/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*)           http://127.0.0.1:1584/$1 [P,L]

    ProxyPass        / http://127.0.0.1:1584/ timeout=600
    ProxyPassReverse / http://127.0.0.1:1584/

    # HSTS (uncomment after you have verified TLS works correctly).
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
</VirtualHost>
