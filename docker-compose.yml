services:
  gitlab:
    container_name: "${GITLAB_CONTAINER_NAME}"
    # Pin via GITLAB_VERSION in .env (e.g. 17.5.2-ce.0). Default keeps prior
    # behavior (`latest`) for compatibility — recommend pinning in production.
    image: "gitlab/gitlab-ce:${GITLAB_VERSION:-latest}"
    restart: on-failure
    hostname: "${GITLAB_HOST}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1/-/readiness"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 5m
    environment:
      GITLAB_ROOT_EMAIL: "${GITLAB_ROOT_EMAIL}"
      GITLAB_ROOT_PASSWORD: "${GITLAB_ROOT_PASSWORD}"
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://${GITLAB_HOST}'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false 

        # SMTP
        gitlab_rails['smtp_enable'] = ${SMTP_ENABLE}
        gitlab_rails['smtp_address'] = "${SMTP_ADDRESS}"
        gitlab_rails['smtp_port'] = ${SMTP_PORT}
        gitlab_rails['smtp_user_name'] = "${SMTP_USER}"
        gitlab_rails['smtp_password'] = "${SMTP_PASS}"
        gitlab_rails['smtp_domain'] = "${SMTP_DOMAIN}"
        gitlab_rails['smtp_authentication'] = "login"
        gitlab_rails['smtp_enable_starttls_auto'] = true
        gitlab_rails['gitlab_email_from'] = "${SMTP_FROM}"
        gitlab_rails['gitlab_email_reply_to'] = "${SMTP_REPLY_TO}"

        # Performances (facultatif si petit serveur)
        puma['worker_processes'] = 1
        sidekiq['max_concurrency'] = 5
        prometheus_monitoring['enable'] = ${GITLAB_PROMETHEUS_ENABLED:-false}

        # Réduction des logs GitLab
        gitlab_rails['log_level'] = :warn
        sidekiq['log_level'] = :warn
        gitlab_workhorse['log_format'] = "none"

        # Rotation interne des logs GitLab
        logrotate['enable'] = true
        logrotate['rotate'] = 7
        logrotate['size'] = '100M'
    ports:
      - "127.0.0.1:${HTTP_PORT}:80"
      - "${SSH_PORT}:22"
    volumes:
      - "./config:/etc/gitlab"
      - "./logs:/var/log/gitlab"
      - "./data:/var/opt/gitlab"
    logging:
      driver: "json-file"
      options:
        max-size: "50M"
        max-file: "3"

  gitlab-runner:
    container_name: "${GITLAB_CONTAINER_NAME}_runner"
    # Pin via RUNNER_VERSION in .env (e.g. 17.5.0). Default `latest` preserves
    # prior behavior — recommend pinning to match the GitLab server version.
    image: "gitlab/gitlab-runner:${RUNNER_VERSION:-latest}"
    restart: unless-stopped
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gitlab-runner-config:/etc/gitlab-runner
      - ./runner-ssh:/root/.ssh
    environment:
      CI_SERVER_URL: "https://${GITLAB_HOST}"
      REGISTRATION_TOKEN: "${RUNNER_REGISTRATION_TOKEN}"
      RUNNER_NAME: "${GITLAB_CONTAINER_NAME}_runner"
      RUNNER_EXECUTOR: "docker"
      DOCKER_IMAGE: "docker:24"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /root/.ssh
        chmod 700 /root/.ssh

        # Ensure ssh-keygen is available. The official runner image (Ubuntu)
        # ships it; this fallback covers exotic base images.
        if ! command -v ssh-keygen >/dev/null 2>&1; then
          if   command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y --no-install-recommends openssh-client
          elif command -v apk     >/dev/null 2>&1; then apk add --no-cache openssh-keygen
          fi
        fi

        # Generate the deploy keypair if missing (idempotent across restarts).
        if [ ! -f /root/.ssh/gitlab-runner-deploy ]; then
          echo "[INIT] no SSH key found, generating ed25519 keypair..."
          ssh-keygen -t ed25519 -C "gitlab-runner-deploy" -f /root/.ssh/gitlab-runner-deploy -N ""
          echo "[INIT] === PUBLIC KEY (append to authorized_keys on every target host) ==="
          cat /root/.ssh/gitlab-runner-deploy.pub
          echo "[INIT] ================================================================"
        fi

        # Generate the deploy-bundle (handy copies for the GitLab UI step).
        if [ ! -d /root/.ssh/deploy-bundle ]; then
          echo "[INIT] generating deploy-bundle..."
          mkdir -p /root/.ssh/deploy-bundle
          cp /root/.ssh/gitlab-runner-deploy /root/.ssh/deploy-bundle/id_ed25519
          chmod 600 /root/.ssh/deploy-bundle/id_ed25519
          cp /root/.ssh/gitlab-runner-deploy.pub /root/.ssh/deploy-bundle/id_ed25519.pub
          base64 -w0 /root/.ssh/gitlab-runner-deploy > /root/.ssh/deploy-bundle/id_ed25519.b64
          echo "[INIT] deploy-bundle written to /root/.ssh/deploy-bundle/"
          echo "[INIT]   - id_ed25519      (private, raw — backup/inspection only, NEVER commit)"
          echo "[INIT]   - id_ed25519.pub  (public — append to ~/.ssh/authorized_keys on each target server)"
          echo "[INIT]   - id_ed25519.b64  (base64 one-line — paste into a GitLab Group CI/CD"
          echo "[INIT]                       Variable named SSH_PRIVATE_KEY_B64, Type 'Variable',"
          echo "[INIT]                       Visibility 'Masked and hidden'. See readme-ci.md.)"
        fi

        if [ ! -s /etc/gitlab-runner/config.toml ]; then
          echo "[INIT] no config.toml found, registering runner..."
          # NOTE: --docker-privileged + docker.sock mount = host root from any
          # pipeline. Acceptable for trusted/internal use; review before
          # exposing the runner to untrusted forks/MRs.
          gitlab-runner register \
            --non-interactive \
            --url "$$CI_SERVER_URL" \
            --token "$$REGISTRATION_TOKEN" \
            --name "$$RUNNER_NAME" \
            --executor "$$RUNNER_EXECUTOR" \
            --docker-image "$$DOCKER_IMAGE" \
            --docker-privileged \
            --docker-volumes "/var/run/docker.sock:/var/run/docker.sock"
        else
          echo "[INIT] existing config.toml found, skipping registration"
        fi
        exec /entrypoint run --user=gitlab-runner --working-directory=/home/gitlab-runner
    logging:
      driver: "json-file"
      options:
        max-size: "20M"
        max-file: "3"
